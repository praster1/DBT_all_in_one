version: 2

sources:
  - name: bronze_retail
    database: bronze
    schema: raw_retail
    tables:
      - name: orders
        config:
          loaded_at_field: _ingested_at
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 6, period: hour}
      - name: order_items
      - name: customers
      - name: products

  - name: bronze_events
    database: bronze
    schema: raw_events
    tables:
      - name: app_events
        config:
          loaded_at_field: _ingested_at

  - name: bronze_billing
    database: bronze
    schema: raw_billing
    tables:
      - name: subscriptions
      - name: invoices
      - name: plans

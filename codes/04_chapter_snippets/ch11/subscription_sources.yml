version: 2

sources:
  - name: raw_billing
    database: analytics
    schema: raw_billing
    freshness:
      warn_after: {count: 6, period: hour}
      error_after: {count: 24, period: hour}
    tables:
      - name: accounts
      - name: plans
      - name: subscriptions
        loaded_at_field: updated_at
      - name: invoices
        loaded_at_field: updated_at

dbt_all_in_one:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      port: 5432
      dbname: analytics
      schema: dbt_dev
      user: analytics
      password: "{{ env_var('DBT_ENV_SECRET_PG_PASSWORD') }}"
      threads: 4
      connect_timeout: 10
      retries: 1
      keepalives_idle: 0
      sslmode: prefer

<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
<rect width="1100" height="560" fill="#f8fafc"/>
<text x="60" y="70" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0f172a">MySQL에서 다음 플랫폼으로 이동해야 할 신호</text>

<rect x="70" y="135" width="960" height="80" rx="18" fill="#e0f2fe"/>
<text x="105" y="185" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#0c4a6e">이 신호가 2~3개 이상 동시에 나타나면 MySQL을 “최종 분석 플랫폼”이 아니라 “중간 경유지”로 보는 편이 좋다.</text>

<g font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">
  <circle cx="110" cy="270" r="10" fill="#ef4444"/><text x="135" y="277">운영계와 분석 배치의 락/부하 경쟁이 반복된다</text>
  <circle cx="110" cy="320" r="10" fill="#ef4444"/><text x="135" y="327">Event Stream이나 snapshot history가 빠르게 커진다</text>
  <circle cx="110" cy="370" r="10" fill="#ef4444"/><text x="135" y="377">전체 rebuild를 안전하게 돌릴 수 있는 시간대가 없다</text>
  <circle cx="110" cy="420" r="10" fill="#ef4444"/><text x="135" y="427">여러 팀이 같은 mart를 공용 surface처럼 사용하기 시작한다</text>
  <circle cx="110" cy="470" r="10" fill="#ef4444"/><text x="135" y="477">semantic, CI, docs, contracts 요구가 커진다</text>
</g>

<rect x="700" y="245" width="280" height="190" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
<text x="730" y="290" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#991b1b">다음 후보 예시</text>
<text x="730" y="330" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• PostgreSQL</text>
<text x="730" y="360" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• BigQuery</text>
<text x="730" y="390" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• Snowflake</text>
<text x="730" y="420" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• ClickHouse / Trino</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<style>
  .title { font: 700 34px 'Arial'; fill: #17203a; }
  .subtitle { font: 400 18px 'Arial'; fill: #4b5563; }
  .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
  .good { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2; rx: 18; }
  .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 18; }
  .head { font: 700 24px 'Arial'; fill: #17203a; }
  .body { font: 400 18px 'Arial'; fill: #1f2937; }
  .mono { font: 700 18px 'Courier New'; fill: #0f172a; }
  .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#m); }
</style>
<defs><marker id="m" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#94a3b8"/></marker></defs>
<rect width="1200" height="760" fill="#f8fafc"/>
<text x="60" y="70" class="title">Transactions, hooks, and workload windows on Postgres</text>
<text x="60" y="105" class="subtitle">Postgres는 hook가 기본적으로 같은 transaction 안에 들어간다는 점이 운영 감각의 핵심 차이다.</text>

<rect x="90" y="180" width="300" height="220" class="good"/>
<text x="120" y="225" class="head">같은 transaction</text>
<text x="120" y="265" class="body">• model create / replace</text>
<text x="120" y="300" class="body">• 기본 pre-hook / post-hook</text>
<text x="120" y="335" class="body">• 실패 시 함께 rollback 가능</text>

<rect x="455" y="180" width="300" height="220" class="warn"/>
<text x="485" y="225" class="head">transaction 밖으로 빼기</text>
<text x="485" y="265" class="mono">before_begin(...)</text>
<text x="485" y="300" class="mono">after_commit(...)</text>
<text x="485" y="335" class="body">• audit insert</text>
<text x="485" y="370" class="body">• analyze / maintenance</text>

<rect x="820" y="180" width="300" height="220" class="box"/>
<text x="850" y="225" class="head">운영 창(window)</text>
<text x="850" y="265" class="body">• 낮: BI / app query</text>
<text x="850" y="300" class="body">• 밤: heavy build / backfill</text>
<text x="850" y="335" class="body">• 주말: snapshot rebuild / maintenance</text>

<path d="M390 290 L455 290" class="arrow"/>
<path d="M755 290 L820 290" class="arrow"/>

<rect x="130" y="470" width="940" height="170" class="box"/>
<text x="165" y="515" class="head">핵심 메시지</text>
<text x="165" y="555" class="body">1. Postgres에서는 hook와 model이 같은 transaction 안에 있다는 점을 먼저 떠올려야 한다.</text>
<text x="165" y="590" class="body">2. 실패해도 남겨야 하는 audit log, analyze 같은 maintenance는 transaction 밖으로 빼는 편이 안전하다.</text>
</svg>
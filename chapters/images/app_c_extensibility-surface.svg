<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#0b1220"/>
  <text x="60" y="70" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">Extensibility Surface</text>
  <text x="60" y="105" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">Jinja → macro → generic test → materialization → package author로 갈수록 운영 계약이 중요해진다</text>

  <rect x="70" y="170" width="200" height="120" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="220" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">Jinja</text>
  <text x="95" y="255" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">loop, if, set</text>

  <rect x="310" y="170" width="200" height="120" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="355" y="220" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">Macro</text>
  <text x="343" y="255" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">expression / hook</text>

  <rect x="550" y="170" width="200" height="120" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="575" y="220" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">Generic Test</text>
  <text x="578" y="255" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">team quality rule</text>

  <rect x="790" y="170" width="200" height="120" rx="18" fill="#111827" stroke="#60a5fa" stroke-width="2"/>
  <text x="808" y="220" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">Materialization</text>
  <text x="830" y="255" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">warehouse lifecycle</text>

  <rect x="430" y="430" width="340" height="160" rx="18" fill="#0f172a" stroke="#2563eb" stroke-width="2"/>
  <text x="500" y="475" fill="#bfdbfe" font-size="26" font-family="Arial, sans-serif" font-weight="700">Package Author</text>
  <text x="470" y="512" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">README, examples, tests,</text>
  <text x="470" y="540" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">require-dbt-version, dispatch, docs</text>

  <line x1="270" y1="230" x2="310" y2="230" stroke="#60a5fa" stroke-width="4"/>
  <polygon points="310,230 295,222 295,238" fill="#60a5fa"/>
  <line x1="510" y1="230" x2="550" y2="230" stroke="#60a5fa" stroke-width="4"/>
  <polygon points="550,230 535,222 535,238" fill="#60a5fa"/>
  <line x1="750" y1="230" x2="790" y2="230" stroke="#60a5fa" stroke-width="4"/>
  <polygon points="790,230 775,222 775,238" fill="#60a5fa"/>

  <line x1="650" y1="290" x2="650" y2="430" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="650,430 642,415 658,415" fill="#94a3b8"/>
</svg>
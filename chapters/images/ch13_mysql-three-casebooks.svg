<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<rect width="1100" height="620" fill="#f8fafc"/>
<text x="60" y="70" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0f172a">세 casebook를 MySQL에서 다루는 기준</text>

<rect x="80" y="130" width="940" height="80" rx="16" fill="#e2e8f0"/>
<text x="120" y="180" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0f172a">기준 질문: 이 예제가 MySQL에서 학습용/검증용으로 충분한가, 아니면 장기 운영에서는 다른 플랫폼이 더 적합한가?</text>

<rect x="90" y="250" width="280" height="250" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
<text x="120" y="295" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#166534">Retail Orders</text>
<text x="120" y="335" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• 가장 자연스러운 시작점</text>
<text x="120" y="368" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• grain/fanout 학습 적합</text>
<text x="120" y="401" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• 작은 mart 검증 적합</text>
<text x="120" y="434" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• 5003 추적 같은 실습 가능</text>

<rect x="410" y="250" width="280" height="250" rx="20" fill="#fef9c3" stroke="#eab308" stroke-width="3"/>
<text x="440" y="295" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#854d0e">Event Stream</text>
<text x="440" y="335" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• toy data 검증까지만 권장</text>
<text x="440" y="368" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• late arrival가 곧 복잡성</text>
<text x="440" y="401" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• microbatch 장기 운영 부적합</text>
<text x="440" y="434" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• 빠른 이전 후보</text>

<rect x="730" y="250" width="280" height="250" rx="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
<text x="760" y="295" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#1d4ed8">Subscription</text>
<text x="760" y="335" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#1e3a8a">• 상태 이력 학습 가능</text>
<text x="760" y="368" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#1e3a8a">• 작은 snapshot 실험 가능</text>
<text x="760" y="401" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#1e3a8a">• MRR 작은 mart 가능</text>
<text x="760" y="434" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#1e3a8a">• history가 커지면 이전 필요</text>

<text x="90" y="560" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#334155">요약: Retail은 학습/검증에 잘 맞고, Subscription은 제한적 운영 가능, Event Stream은 구조 학습용으로만 짧게 다루는 편이 안전하다.</text>
</svg>
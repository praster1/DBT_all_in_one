<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0b1220"/>
  <text x="60" y="70" fill="#f8fafc" font-size="34" font-family="Arial, sans-serif" font-weight="700">Macro Decision Ladder</text>
  <text x="60" y="105" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">macro를 언제 써야 하는가를 가장 안전한 층부터 판단한다</text>

  <rect x="80" y="160" width="1040" height="120" rx="18" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="205" fill="#dcfce7" font-size="24" font-family="Arial, sans-serif" font-weight="700">1. Expression macro</text>
  <text x="120" y="240" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">반복되는 컬럼 표현식, 가벼운 SQL 조각, side effect 없음</text>

  <rect x="120" y="330" width="960" height="120" rx="18" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="375" fill="#fde68a" font-size="24" font-family="Arial, sans-serif" font-weight="700">2. Project behavior macro</text>
  <text x="160" y="410" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">generate_schema_name, query comment, grants, logging hook처럼 전역 규칙 변경</text>

  <rect x="160" y="500" width="880" height="120" rx="18" fill="#111827" stroke="#ef4444" stroke-width="2"/>
  <text x="200" y="545" fill="#fecaca" font-size="24" font-family="Arial, sans-serif" font-weight="700">3. Extensibility macro</text>
  <text x="200" y="580" fill="#e5e7eb" font-size="20" font-family="Arial, sans-serif">custom generic test, materialization, dispatch, package author surface</text>

  <line x1="600" y1="280" x2="600" y2="330" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="600,330 592,315 608,315" fill="#94a3b8"/>
  <line x1="600" y1="450" x2="600" y2="500" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="600,500 592,485 608,485" fill="#94a3b8"/>
</svg>
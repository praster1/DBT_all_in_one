<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
<style>
.title{font:700 28px Arial,sans-serif;fill:#122230}
.sub{font:600 18px Arial,sans-serif;fill:#35506a}
.body{font:15px Arial,sans-serif;fill:#203647}
.label{font:700 18px Arial,sans-serif;fill:#17344e}
.box{fill:#f8fbfd;stroke:#5b7a94;stroke-width:2;rx:18;ry:18}
.arrow{stroke:#4a6578;stroke-width:3;marker-end:url(#m)}
</style>
<defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 z" fill="#4a6578"/></marker></defs>
<text x="60" y="55" class="title">Databricks Refresh Paths</text>
<text x="60" y="86" class="sub">Which surface should you choose for dbt models on Databricks?</text>

<rect x="90" y="140" width="1020" height="110" class="box"/>
<text x="120" y="180" class="label">1) SQL table / view</text>
<text x="120" y="215" class="body">Start here when the model is stable, readable, and doesn't need continuous refresh semantics.</text>

<rect x="90" y="290" width="1020" height="110" class="box"/>
<text x="120" y="330" class="label">2) incremental (append / merge / replace_where / delete+insert / microbatch)</text>
<text x="120" y="365" class="body">Use when the table is too large to rebuild or when time-series batch windows matter.</text>

<rect x="90" y="440" width="1020" height="110" class="box"/>
<text x="120" y="480" class="label">3) Python model</text>
<text x="120" y="515" class="body">Use only when DataFrame logic, nested data shaping, or library use gives a real advantage over SQL.</text>

<rect x="90" y="590" width="1020" height="150" class="box"/>
<text x="120" y="630" class="label">4) materialized_view / streaming_table</text>
<text x="120" y="665" class="body">Promote only published, repeatedly queried, refresh-sensitive surfaces. Requires Unity Catalog + serverless SQL Warehouses.</text>
<text x="120" y="700" class="body">Use schedule, tags, tblproperties, comments, and governance — not just automatic refresh.</text>

<line x1="600" y1="250" x2="600" y2="290" class="arrow"/>
<line x1="600" y1="400" x2="600" y2="440" class="arrow"/>
<line x1="600" y1="550" x2="600" y2="590" class="arrow"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
<rect width="1100" height="560" fill="#f8fafc"/>
<text x="60" y="70" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0f172a">MySQL에서 dbt를 맡기기 좋은 범위</text>
<text x="60" y="105" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#475569">학습/검증에는 충분히 유용하지만, 이벤트성 대량 워크로드와 공용 분석 플랫폼 역할은 빠르게 한계가 드러난다.</text>

<rect x="70" y="160" rx="20" ry="20" width="240" height="230" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
<text x="95" y="205" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#166534">잘 맞는 구간</text>
<text x="95" y="245" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• 작은 mart 검증</text>
<text x="95" y="278" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• source/ref/tests/docs</text>
<text x="95" y="311" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• 운영계 근처의 실험</text>
<text x="95" y="344" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#14532d">• day1/day2 재현</text>

<rect x="345" y="160" rx="20" ry="20" width="240" height="230" fill="#fef9c3" stroke="#eab308" stroke-width="3"/>
<text x="370" y="205" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#854d0e">주의 구간</text>
<text x="370" y="245" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• incremental merge</text>
<text x="370" y="278" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• snapshot 증가</text>
<text x="370" y="311" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• 큰 rebuild</text>
<text x="370" y="344" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#713f12">• 운영계와 리소스 경쟁</text>

<rect x="620" y="160" rx="20" ry="20" width="340" height="230" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
<text x="645" y="205" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#991b1b">다른 플랫폼을 우선 검토할 구간</text>
<text x="645" y="245" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• Event stream 장기 누적</text>
<text x="645" y="278" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• microbatch / 대규모 incremental</text>
<text x="645" y="311" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• 다수 팀의 공용 API surface</text>
<text x="645" y="344" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#7f1d1d">• heavy CI + docs + semantic 운영</text>

<line x1="310" y1="275" x2="345" y2="275" stroke="#64748b" stroke-width="4"/>
<polygon points="345,275 332,268 332,282" fill="#64748b"/>
<line x1="585" y1="275" x2="620" y2="275" stroke="#64748b" stroke-width="4"/>
<polygon points="620,275 607,268 607,282" fill="#64748b"/>

<text x="70" y="460" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#0f172a">핵심 메시지</text>
<text x="70" y="495" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#334155">MySQL에서는 “무엇을 만들 수 있는가”보다 “어디까지를 여기서 하고, 언제 다음 플랫폼으로 이동할지”를 먼저 정해야 한다.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="720" viewBox="0 0 1140 720"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs><rect x="20" y="20" width="1100" height="680" rx="20" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="50" y="65" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Snowflake Refresh Paths</text><rect x="60" y="120" width="180" height="110" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="150" y="160" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">VIEW</text><text x="150" y="188" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">빠른 개발</text><text x="150" y="212" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">가벼운 surface</text><rect x="280" y="120" width="180" height="110" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="370" y="160" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">TABLE</text><text x="370" y="188" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">안정적 published</text><text x="370" y="212" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">contract 후보</text><rect x="500" y="120" width="200" height="110" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/><text x="600" y="160" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">INCREMENTAL</text><text x="600" y="188" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">merge/delete+insert</text><text x="600" y="212" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">large refresh control</text><rect x="740" y="120" width="200" height="110" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="840" y="160" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">DYNAMIC TABLE</text><text x="840" y="188" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">target_lag</text><text x="840" y="212" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="middle">auto refresh</text><rect x="980" y="120" width="100" height="110" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="1030" y="160" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">PUBLIC</text><text x="1030" y="188" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="16" font-weight="500" fill="#111827" text-anchor="middle">secure/copy</text><text x="1030" y="212" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="16" font-weight="500" fill="#111827" text-anchor="middle">grants</text><line x1="240" y1="175" x2="280" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/><line x1="460" y1="175" x2="500" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/><line x1="700" y1="175" x2="740" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/><line x1="940" y1="175" x2="980" y2="175" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/><rect x="80" y="320" width="300" height="260" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="230" y="360" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">언제 dynamic table?</text><text x="110" y="405" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• Event/session refresh를 자주 돌려야 할 때</text><text x="110" y="435" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• target lag를 명시하고 싶을 때</text><text x="110" y="465" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• 하지만 contract / copy_grants 제한을 감수할 수 있을 때</text><rect x="430" y="320" width="300" height="260" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="580" y="360" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">언제 table + contract?</text><text x="460" y="405" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• Retail / Subscription public mart</text><text x="460" y="435" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• BI/finance에 안정적 schema를 제공할 때</text><text x="460" y="465" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• grants와 version을 함께 운영할 때</text><rect x="780" y="320" width="270" height="260" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="915" y="360" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">운영 주의점</text><text x="810" y="405" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• source freshness는 LAST_ALTERED caveat</text><text x="810" y="435" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• query_tag는 session-level</text><text x="810" y="465" font-family="Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" font-weight="500" fill="#111827" text-anchor="start">• 큰 warehouse 하나에 모든 build 몰지 않기</text></svg>